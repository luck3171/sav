name: Daily SAV Export

on:
  schedule:
    - cron: '0 0,12 * * *' # 每天北京时间 08:00 和 20:00 运行
  workflow_dispatch: # 支持手动触发测试

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run-export-and-download:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SAV_USERNAME: ${{ secrets.SAV_USERNAME }}
      SAV_PASSWORD: ${{ secrets.SAV_PASSWORD }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      SAV_NO_SANDBOX: 'true'
      SAV_HEADLESS: 'false'
      SAV_FINGERPRINT_SEED: '54321'
      SAV_USER_DATA_DIR: .sav-profile

      R2_ENDPOINT: 'https://88a983a33ad1822518ad743ad7d98dcb.r2.cloudflarestorage.com'
      R2_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install system deps & Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          # CloakBrowser 的 Chromium 需要系统库，playwright 的 install-deps 会安装所有必要依赖
          npx playwright install-deps chromium

      - name: Debug - Show what is inside r2.ts
        run: cat scripts/r2.ts


      - name: Restore Browser Profile from R2 Cache
        run: npx ts-node scripts/r2.ts restore

      - name: Execute Export Script
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npx ts-node src/index.ts

      - name: Cache Browser Profile to R2
        if: success()
        run: npx ts-node scripts/r2.ts upload-profile

      - name: Upload Downloaded CSVs to R2
        if: success()
        run: npx ts-node scripts/r2.ts upload-csv

      - name: Upload Error Logs to GitHub
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: error-screenshots
          path: logs/
          retention-days: 7

      - name: Healthcheck Ping (Success)
        if: success()
        run: curl -fsS -m 10 --retry 5 https://hc-ping.com/2483718f-0a36-48cd-a1d2-df3af63af630

      - name: Healthcheck Ping (Failure)
        if: failure()
        run: curl -fsS -m 10 --retry 5 https://hc-ping.com/2483718f-0a36-48cd-a1d2-df3af63af630/fail