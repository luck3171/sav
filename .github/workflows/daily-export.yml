name: Daily SAV Export

on:
  schedule:
    - cron: '0 0,12 * * *' # 每天北京时间 08:00 和 20:00 运行
  workflow_dispatch: # 支持手动触发测试

jobs:
  run-export-and-download:
    runs-on: ubuntu-latest
    env:
      SAV_USERNAME: ${{ secrets.SAV_USERNAME }}
      SAV_PASSWORD: ${{ secrets.SAV_PASSWORD }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      SAV_NO_SANDBOX: 'true'
      SAV_STORAGE_STATE_PATH: .sav-storage-state.json
      GITHUB_ACTIONS: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci # 【优化】使用 ci 代替 install，提升构建速度和稳定性

      - name: Install Playwright & Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          npx playwright install chromium --with-deps

      # 1. 尝试恢复最新的会话缓存
      - name: Restore Session Cache
        id: cache-session # 【关键】增加 ID 以供后续步骤引用
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.SAV_STORAGE_STATE_PATH }}
          key: sav-session-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            sav-session-${{ runner.os }}-

      # 2. 播种逻辑：仅在 Cache 未命中时执行
      - name: Seed Initial State from Secret
        if: steps.cache-session.outputs.cache-hit != 'true' # 【核心修复】防止覆盖有效缓存
        env:
          SAV_JSON_SEED: ${{ secrets.SAV_STORAGE_STATE_JSON }}
        run: |
          if [ -n "$SAV_JSON_SEED" ]; then
            echo "[INFO] Cache missed. Seeding Session file from secret..."
            # 【优化】使用 EOF 安全写入多行 JSON，避免转义错误
            cat << 'EOF' > "${{ env.SAV_STORAGE_STATE_PATH }}"
          $SAV_JSON_SEED
          EOF
          else
            echo "[WARN] Cache missed and no seed secret provided. Script will attempt fresh login."
          fi

      # 3. 核心业务：在虚拟显示器中执行 TS 脚本
      - name: Execute Export Script
        run: |
          # 运行前检查文件是否存在，方便在 Actions 日志中排错
          ls -la "${{ env.SAV_STORAGE_STATE_PATH }}" || echo "[WARN] Session file not found on disk!"
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npx ts-node src/index.ts

      # 4. 存档：覆盖并保存最新的状态
      - name: Save Session Cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: ${{ env.SAV_STORAGE_STATE_PATH }}
          key: sav-session-${{ runner.os }}-${{ github.run_id }}

      # 5. 上传导出的 CSV 文件
      - name: Upload Downloaded CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sav-auctions-csv
          path: downloads/*.csv
          retention-days: 30

      # 6. 上传错误截图
      - name: Upload Error Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: logs/
          retention-days: 7