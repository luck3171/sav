name: Daily SAV Export

on:
  schedule:
    - cron: '0 0,12 * * *' # 每天北京时间 08:00 和 20:00 运行
  workflow_dispatch: # 支持手动触发测试

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  run-export-and-download:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SAV_USERNAME: ${{ secrets.SAV_USERNAME }}
      SAV_PASSWORD: ${{ secrets.SAV_PASSWORD }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      SAV_NO_SANDBOX: 'true'
      SAV_HEADLESS: 'false'
      SAV_FINGERPRINT_SEED: '54321'
      SAV_USER_DATA_DIR: .sav-profile

      S3_BUCKET: 'domains-storage'
      R2_ENDPOINT: 'https://88a983a33ad1822518ad743ad7d98dcb.r2.cloudflarestorage.com'

      AWS_DEFAULT_REGION: 'auto'
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright & Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          npx playwright install chromium --with-deps

      - name: Restore Browser Profile from R2 Cache
        run: |
          PROFILE_DIR="${{ env.SAV_USER_DATA_DIR }}"
          mkdir -p "$PROFILE_DIR"

          echo "[INFO] Attempting to download cached browser profile from R2..."
          if OUTPUT=$(aws s3 cp "s3://${{ env.S3_BUCKET }}/profile-cache.tar.gz" ./profile-cache.tar.gz --endpoint-url ${{ env.R2_ENDPOINT }} 2>&1); then
            echo "[INFO] Profile cache found. Extracting..."
            tar -xzf profile-cache.tar.gz -C "$PROFILE_DIR" 2>/dev/null && echo "[INFO] Profile restored" || echo "[WARN] Extract failed, will create fresh profile"
            rm -f profile-cache.tar.gz
          else
            echo "[INFO] No cached profile found, will create fresh session."
          fi

          ls -la "$PROFILE_DIR/" || echo "[INFO] Empty profile directory"

      - name: Execute Export Script
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npx ts-node src/index.ts

      - name: Cache Browser Profile to R2
        if: success()
        run: |
          PROFILE_DIR="${{ env.SAV_USER_DATA_DIR }}"
          if [ -d "$PROFILE_DIR" ] && [ "$(ls -A "$PROFILE_DIR" 2>/dev/null)" ]; then
            echo "[INFO] Caching browser profile to R2..."
            tar -czf profile-cache.tar.gz -C "$PROFILE_DIR" .
            aws s3 cp ./profile-cache.tar.gz "s3://${{ env.S3_BUCKET }}/profile-cache.tar.gz" --endpoint-url ${{ env.R2_ENDPOINT }}
            rm -f profile-cache.tar.gz
            echo "[INFO] Profile cached successfully"
          fi

      - name: Upload Downloaded CSVs to R2
        if: success()
        run: |
          if [ -d "downloads" ] && [ "$(ls -A downloads)" ]; then
            aws s3 sync downloads/ "s3://${{ env.S3_BUCKET }}/downloads/" --endpoint-url ${{ env.R2_ENDPOINT }}
          fi

      - name: Upload Error Logs to GitHub
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: logs/
          retention-days: 7

      - name: Healthcheck Ping (Success)
        if: success()
        run: curl -fsS -m 10 --retry 5 https://hc-ping.com/2483718f-0a36-48cd-a1d2-df3af63af630

      - name: Healthcheck Ping (Failure)
        if: failure()
        run: curl -fsS -m 10 --retry 5 https://hc-ping.com/2483718f-0a36-48cd-a1d2-df3af63af630/fail