name: Daily SAV Export

on:
  schedule:
    - cron: '0 0,12 * * *' # 每天北京时间 08:00 和 20:00 运行
  workflow_dispatch: # 支持手动触发测试

jobs:
  run-export-and-download:
    runs-on: ubuntu-latest
    # 将公共环境变量提取到 Job 级别，使步骤更简洁
    env:
      SAV_USERNAME: ${{ secrets.SAV_USERNAME }}
      SAV_PASSWORD: ${{ secrets.SAV_PASSWORD }}
      EMAIL_USER: ${{ secrets.EMAIL_USER }}
      EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
      EMAIL_HOST: ${{ secrets.EMAIL_HOST }}
      SAV_NO_SANDBOX: 'true'
      SAV_STORAGE_STATE_PATH: .sav-storage-state.json
      GITHUB_ACTIONS: 'true'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm install
      - name: Install Playwright & Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          npx playwright install chromium --with-deps

      - name: Restore Session Cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.SAV_STORAGE_STATE_PATH }}
          key: sav-session-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            sav-session-${{ runner.os }}-

      - name: Execute Export Script
        run: |
          # 检查并初始化 Session 文件 (如果 Cache 未命中)
          if [ ! -f "${{ env.SAV_STORAGE_STATE_PATH }}" ] && [ "${{ secrets.SAV_STORAGE_STATE_JSON }}" != "" ]; then
            echo "[INFO] Cache missed, initializing from secret seed..."
            echo '${{ secrets.SAV_STORAGE_STATE_JSON }}' > "${{ env.SAV_STORAGE_STATE_PATH }}"
          fi
          
          # 使用 xvfb-run 启动有头模式浏览器，绕过 Cloudflare 检测
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" npx ts-node src/index.ts

      - name: Save Session Cache
      #仅在导出成功且 Session 更新时保存
        if: success()    
        uses: actions/cache/save@v4 # <--- 必须补全这一行，解决报错
        with:
          path: ${{ env.SAV_STORAGE_STATE_PATH }}
          key: sav-session-${{ runner.os }}-${{ github.run_id }}
      - name: Upload Downloaded CSV
      # 确保即使脚本部分出错也尝试上传已下载的 CSV
        if: always() 
        uses: actions/upload-artifact@v4
        with:
          name: sav-auctions-csv
          path: downloads/*.csv
          retention-days: 30

      - name: Upload Error Logs
      # 仅在失败时上传截图用于排查
        if: failure() 
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: logs/
          retention-days: 7